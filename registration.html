<!DOCTYPE html>
<html>
<head>
<title>Student Registration</title>
<style>
  body {font-family: Arial; margin:0; background:#f2f8ff;}
  header {
    background:#0073e6; color:white; padding:15px 0; text-align:center;
    position:sticky; top:0;
  }
  nav a {
    color:white; margin:0 15px; text-decoration:none; font-weight:bold;
  }
  nav a:hover {text-decoration:underline; color:#ffcc00;}
  form {
    background:#fff; padding:20px; width:350px; margin:40px auto;
    border-radius:10px; box-shadow:0 0 10px gray;
  }
  input, select, textarea {
    width:100%; padding:8px; margin:6px 0; box-sizing:border-box;
  }
  input[type=submit], input[type=reset] {
    width:48%; background:#0073e6; color:white; border:none;
    padding:10px; border-radius:5px; cursor:pointer;
  }
  input[type=reset] {background:#f44336;}
</style>
</head>
<body>
<header>
  <h2>Student Portal</h2>
  <nav>
    <a href="index.html">Home</a>
    <a href="registration.html">Register</a>
    <a href="view.html">View</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<form>
  <h3 align="center">Student Registration Form</h3>
  <label>Name:</label>
  <input type="text" name="name" required>

  <label>Roll No:</label>
  <input type="text" name="roll" required>

  <label>Email:</label>
  <input type="email" name="email">

  <label>Gender:</label>
  <select name="gender">
    <option>Male</option>
    <option>Female</option>
    <option>Other</option>
  </select>

  <label>Course:</label>
  <input type="text" name="course">

  <label>Address:</label>
  <textarea name="address" rows="3"></textarea>

  <input type="submit" value="Register">
  <input type="reset" value="Clear">
</form>
</body>
</html>
